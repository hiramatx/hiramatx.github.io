# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

# Site Settings
locale: "en-US"
title: "Hiram Martinez"
title_separator: "-"
subtitle: "IT Support | Sysadmin"
name: "Hiram Martinez"
description: "IT support professional. Helpdesk, sysadmin, home lab enthusiast."
url: "https://hiramatx.github.io"
baseurl: ""
repository: "hiramatx/hiramatx.github.io"

# Author
author:
  name: "Hiram Martinez"
  avatar: "/assets/images/avatar.jpg"  # add a headshot photo here
  bio: "IT support professional. Helpdesk, sysadmin, home lab enthusiast."
  location: "Austin, TX"  # e.g. "San Antonio, TX"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hiramatx"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/hiram-martinez/"  # add your LinkedIn profile URL

# Reading Files
include:
  - .htaccess
  - _pages

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# Pagination
paginate: 5
paginate_path: /page:num/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      share: false
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
